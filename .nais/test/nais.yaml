# Deploy config for the test cluster
apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: klass-web
  namespace: dapla-metadata

spec:
  ingresses:
    - https://klass-web.test.ssb.no
  port: 3000
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
  replicas:
    min: 1
    max: 1
  resources:
    requests:
      cpu: 5m
      memory: 32Mi
    limits:
      cpu: 10m
      memory: 64Mi
