name: App build and deploy

on:
  release:
    types: [published]
  push:
    branches:
      - master

jobs:
  docker-build:
    name: Docker build
    permissions:
      contents: "read"
      id-token: "write"
    runs-on: ubuntu-latest
    outputs:
      nais_config_path: ${{ steps.nais-deploy-vars.outputs.nais_config_path }}
      nais_cluster: ${{ steps.nais-deploy-vars.outputs.nais_cluster }}
    env:
      EVENT: ${{ github.event_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate NAIS deploy variables
        id: nais-deploy-vars
        run: |
          if [[ ${{ env.EVENT }} == "release" ]]; then
            echo "nais_cluster=prod" >> "$GITHUB_OUTPUT"
            echo "nais_config_path=.nais/prod/nais.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "nais_cluster=test" >> "$GITHUB_OUTPUT"
            echo "nais_config_path=.nais/test/nais.yaml" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate vulnerability report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: "fs"
          format: "cyclonedx"
          output: "dependency-results.sbom.json"
          scan-ref: "."

      - name: Build and push
        uses: nais/docker-build-push@05dbb6091b30bd84279c6d64a45ef8782fd410a5 # v0
        id: docker-build-push
        with:
          team: dapla-metadata
          build_args: |
            target_env=${{ steps.nais-deploy-vars.outputs.nais_cluster }}
          byosbom: "dependency-results.sbom.json"

      - uses: nais/deploy/actions/deploy@157203210ef983b1d2fb32db50d177043ce95ebd # v2
        env:
          CLUSTER: ${{ steps.nais-deploy-vars.outputs.nais_cluster }}
          RESOURCE: ${{ steps.nais-deploy-vars.outputs.nais_config_path }}
          DEPLOY_SERVER: deploy.ssb.cloud.nais.io:443
          WORKLOAD_IMAGE: ${{ steps.docker-build-push.outputs.image }}
          TELEMETRY: ${{ steps.docker-build-push.outputs.telemetry }}
