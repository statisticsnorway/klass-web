name: Grype security scan
on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
jobs:
  grype-scan:
    runs-on: ubuntu-latest
    # Permissions key is required for CodeQL SARIF Upload, per the docs:
    # https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/uploading-a-sarif-file-to-github
    permissions:
      security-events: write
      contents: "read"
      id-token: "write"
      packages: "read"
      actions: "read"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Build the Container image
        run: docker build . --file Dockerfile --tag klass-web:latest
      - name: Display scan result as table
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan_table
        with:
          image: "klass-web:latest"
          output-format: table
          fail-build: false
          severity-cutoff: high
      - name: Create Docker SARIF file
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          image: "klass-web:latest"
          fail-build: false
          severity-cutoff: high
    
      - name: Filter Docker SARIF (security-severity > 1.0, high/critical)
        run: |
          jq '
            .runs |= map(
              ( (.tool.driver.rules // []) | map({key: .id, value: .}) | from_entries ) as $rules
              | .results |= map(
                  select(
                    (.level == "error")
                    and (((($rules[.ruleId].properties["security-severity"] // "0") | try tonumber catch 0)) > 1.0)
                  )
                )
              | (.results | map(.ruleId) | unique) as $keep
              | .tool.driver.rules |= map(select(.id as $id | $keep | index($id)))
            )
          ' "${{ steps.scan.outputs.sarif }}" > docker.filtered.sarif

      - name: Upload Docker SARIF report
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: docker.filtered.sarif

      - name: Generate SBOM (SPDX-JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
           image: "klass-web:latest"
           format: spdx-json
           output-file: sbom.spdx.json
      - name: Create SBOM SARIF file
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan_sbom
        with:
            sbom: "sbom.spdx.json"
            fail-build: false
            severity-cutoff: high

      - name: Filter SBOM SARIF (security-severity > 1.0, high/critical)
        run: |
          jq '
            .runs |= map(
              ( (.tool.driver.rules // []) | map({key: .id, value: .}) | from_entries ) as $rules
              | .results |= map(
                  select(
                    (.level == "error")
                    and (((($rules[.ruleId].properties["security-severity"] // "0") | try tonumber catch 0)) > 1.0)
                  )
                )
              | (.results | map(.ruleId) | unique) as $keep
              | .tool.driver.rules |= map(select(.id as $id | $keep | index($id)))
            )
          ' "${{ steps.scan_sbom.outputs.sarif }}" > sbom.filtered.sarif

            
      - name: Upload SBOM scan SARIF report
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
            sarif_file: sbom.filtered.sarif
            category: grype-sbom